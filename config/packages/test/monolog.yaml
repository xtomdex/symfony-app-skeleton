monolog:
    handlers:
        main:
            type: fingers_crossed
            action_level: error
            handler: nested
            excluded_http_codes: [404, 405]
            channels: ["!event"]
        nested:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
        # In tests we usually don't need domain event logs.
        # Keep it as a NullHandler to avoid file IO noise.
        domain_event:
            type: null
            channels: [ "domain_event" ]
