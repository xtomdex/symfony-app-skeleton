monolog:
    channels:
        - deprecation
        - domain_event # Deprecations are logged in the dedicated "deprecation" channel when it exists

    handlers:
        main:
            type: stream
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
            channels: ["!event", "!domain_event"]
        domain_event:
            type: stream
            path: "%kernel.logs_dir%/domain_events.log"
            level: info
            channels: ["domain_event"]
        domain_event_db:
            type: service
            id: App\Infrastructure\Logging\Handler\DoctrineDomainEventDbHandler
            level: info
            channels: [ "domain_event" ]
        console:
            type: console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine", "!console", "!domain_event"]
