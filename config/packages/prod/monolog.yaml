monolog:
    handlers:
        main:
            type: fingers_crossed
            action_level: error
            handler: nested
            excluded_http_codes: [404, 405]
            channels: ["!deprecation", "!domain_event"]
            buffer_size: 50 # How many messages should be saved? Prevent memory leaks
        nested:
            type: stream
            path: php://stderr
            level: debug
            formatter: monolog.formatter.json
        domain_event:
            type: stream
            path: php://stderr
            level: info
            formatter: monolog.formatter.json
            channels: ["domain_event"]
        console:
            type: console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine", "!domain_event"]
        deprecation:
            type: stream
            channels: [deprecation]
            path: php://stderr
            formatter: monolog.formatter.json

